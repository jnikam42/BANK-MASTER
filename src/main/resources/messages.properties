## Activation and Deactivation Messages
activation.service.msg=000::Activated Service
deactivation.service.msg=000::Deactivated Service
activation.product.msg=000::Activated Product
deactivation.product.msg=000::Deactivated Product
activation.feature.msg=000::Activated Feature
deactivation.feature.msg=000::Deactivated Feature

## Success and Error Codes
success.code=000::Operation completed successfully.
bank.mapping.save.success=000::Bank mapping saved successfully.

## Validation Messages
invalid.service.id.msg=701::Service ID is not available or invalid.
invalid.service.or.bank.id=704::The provided bankId or serviceId does not exist in the system.
invalid.flag.msg=705::isActive flag must be either 'Y' (activate) or 'N' (deactivate).
invalid.request.msg=706::bankId, serviceId, and isActive flag are required.

## Not Found Messages
service.not.found=701::No services found.
product.not.found=702::No products found for the given serviceId.
feature.not.found=703::No features found for the given product.

## Regular Expressions
service.id.regex=^[1-9][0-9]*$
product.id.regex=^[1-9][0-9]*$
product.name.regex=^[a-zA-Z0-9 _-]{0,100}$
feature.name.regex=^[a-zA-Z0-9 _-]{0,100}$
activation.flag=717::Y
card.file.details.not.found=717::No records found.